<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | Integrated System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --sidebar-bg: rgba(10, 10, 15, 0.6);
            --sidebar-width: 70px;
            --accent-primary: #FF3366;
            --accent-secondary: #00E5FF;
            --accent-tertiary: #7000FF;
            --text-main: #ffffff;
            --text-muted: #888899;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-hover: rgba(255, 255, 255, 0.06);
            --glow-color: rgba(255, 51, 102, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: scroll;
            display: block;
            letter-spacing: -0.02em;
        }

        /* Animated Mesh Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(112, 0, 255, 0.15), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(255, 51, 102, 0.15), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(0, 229, 255, 0.1), transparent 40%);
            background-size: 100% 100%;
            animation: meshGradient 20s ease infinite alternate;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes meshGradient {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* Sidebar Overlay Style (Left-side navigation) */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 0;
            z-index: 1000;
        }

        .nav-item {
            width: 44px;
            height: 44px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid transparent;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: all 0.4s;
        }

        .nav-item:hover svg {
            fill: var(--text-main);
            transform: scale(1.1);
        }

        .nav-item.active {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .nav-item.active svg {
            fill: var(--accent-primary);
        }

        /* Indicator Line */
        .nav-item.active::before {
            content: "";
            position: absolute;
            left: -2px;
            top: calc(50% - 10px);
            width: 3px;
            height: 20px;
            background: var(--accent-primary);
            animation: indicatorPulse 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        @keyframes indicatorPulse {
            0%, 100% { transform: scaleY(0.8); opacity: 0.6; }
            50% { transform: scaleY(1.4); opacity: 1; }
        }

        /* Main Content - Preserving Original Center Layout */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px; /* Original Max Width */
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        @keyframes initialFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: left;
            margin-bottom: 4rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--glow-color);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* Chapter Transition System */
        .chapter {
            display: none;
            width: 100%;
        }

        .chapter.active {
            display: block;
            animation: chapterIn 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .chapter.fade-out {
            animation: chapterOut 0.5s forwards ease-in;
        }

        @keyframes chapterIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes chapterOut {
            from { opacity: 1; transform: translateY(0); filter: blur(0); }
            to { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
        }

        /* Builder Styling (Maintained from original) */
        .builder-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        .option-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.7rem 0.9rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 52px;
            backdrop-filter: blur(12px);
            overflow: hidden;
            z-index: 1;
        }

        .option-card::before {
            content: "";
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
        }

        .option-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 15px var(--glow-color);
        }

        .option-card:hover::before {
            opacity: 0.15;
        }

        .option-card:active {
            transform: translateY(0) scale(0.98);
        }

        .option-card.stagger-in {
            animation: cardStagger 0.4s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
        
        @keyframes cardStagger {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 51, 102, 0.1);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.2) inset;
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-secondary));
            opacity: 1;
        }

        .option-label {
            font-weight: 700;
            font-size: 0.78rem; /* Reduced from 0.9rem */
            display: block;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-desc {
            font-size: 0.58rem; /* Reduced from 0.65rem */
            color: var(--text-muted);
            line-height: 1.1;
            font-weight: 400;
            margin-top: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chapter 3 Specific: Sub-Category Tabs */
        .tab-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-primary) var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .tab-wrapper::-webkit-scrollbar {
            height: 3px;
        }
        .tab-wrapper::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
        }
        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 14px;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .tab-btn:hover {
            color: var(--text-main);
            border-color: #555;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn.active {
            color: var(--accent-primary);
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.1);
        }
        .tab-wrapper {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
        }
        .tab-wrapper::-webkit-scrollbar {
            height: 4px;
        }
        .tab-wrapper::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }
        .tab-content {
            display: none;
            margin-top: 1rem;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        /* Locked / Coming Soon State */
        .nav-item.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .nav-item.locked:hover {
            background: transparent;
            box-shadow: none;
        }
        .chapter-locked-overlay {
            position: relative;
            width: 100%;
            min-height: 60vh;
        }
        .chapter-locked-overlay .locked-content {
            filter: blur(8px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
        }
        .chapter-locked-overlay .locked-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        .locked-badge span {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .locked-badge small {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.1rem;
        }

        /* New Split-Screen Layout Architecture */
        .app-container {
            display: flex;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
        }

        /* Main Content Area (Options Grid) */
        .content-area {
            flex: 1;
            padding: 4rem 3rem 4rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-right: 1px solid var(--border-color); /* Boundary line */
        }

        .container {
            width: 100%;
            max-width: 1000px;
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        /* Sticky Result Sidebar - Guaranteed No Overlap */
        .result-sidebar {
            width: 400px;
            min-width: 400px;
            height: 100vh;
            position: sticky;
            top: 0;
            background: var(--sidebar-bg);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border-color);
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .result-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: panelEntrance 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes panelEntrance {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-header {
            margin-bottom: 2rem;
            border-left: 3px solid var(--accent-primary);
            padding-left: 1rem;
        }

        .result-title {
            font-weight: 900;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            font-family: 'Outfit', sans-serif;
        }

        #final-prompt {
            flex: 1;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            color: #ccc;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            transition: all 0.4s;
            margin-bottom: 2rem;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        #final-prompt:focus {
            border-color: var(--accent-secondary);
            color: #fff;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #000;
            font-weight: 700;
        }

        .side-button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            border: none;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 51, 102, 0.5);
            filter: brightness(1.2);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:not(.btn-primary):hover {
            background: var(--card-hover);
            border-color: var(--accent-secondary);
            color: var(--accent-secondary);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }

        /* Security System Styles */
        #security-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(10, 10, 15, 0.9) 0%, #000 100%),
                radial-gradient(circle at 20% 80%, rgba(112, 0, 255, 0.2), transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 51, 102, 0.15), transparent 50%);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .security-card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4rem 3rem;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(112, 0, 255, 0.2);
            animation: cardEntrance 1s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .security-logo {
            margin-bottom: 2rem;
            display: inline-block;
        }

        .security-logo svg {
            width: 60px;
            height: 60px;
            fill: url(#logo-gradient);
            filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.5));
        }

        .security-card h2 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.3rem;
            margin-bottom: 0.5rem;
        }

        .security-card p {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 2.5rem;
            letter-spacing: 0.1rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .security-card input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            letter-spacing: 0.5rem;
            font-weight: 700;
            transition: all 0.4s;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .security-card input:focus {
            border-color: var(--accent-secondary);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .security-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            color: #fff;
            border: none;
            width: 100%;
            padding: 1.2rem;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            cursor: pointer;
            transition: all 0.4s;
            font-family: 'Outfit', sans-serif;
            box-shadow: 0 5px 20px rgba(255, 51, 102, 0.3);
        }

        .security-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 51, 102, 0.5);
            filter: brightness(1.2);
        }

        .security-btn:active {
            transform: translateY(0);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
            border-color: #ff4444 !important;
        }

        .system-status {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.6rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            font-weight: 700;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #222;
        }

        .dot.active {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- Security Authentication Overlay -->
    <div id="security-overlay">
        <div class="security-card" id="security-card">
            <div class="security-logo">
                <svg viewBox="0 0 24 24">
                    <defs>
                        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--accent-secondary)" />
                            <stop offset="100%" stop-color="var(--accent-primary)" />
                        </linearGradient>
                    </defs>
                    <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,11.5A2.5,2.5 0 0,1 14.5,14A2.5,2.5 0 0,1 12,16.5A2.5,2.5 0 0,1 9.5,14A2.5,2.5 0 0,1 12,11.5M12,2C14.75,2.82 17,5.5 17,9C17,11.5 15.5,14.5 12,16.5C8.5,14.5 7,11.5 7,9C7,5.5 9.25,2.82 12,2Z" />
                </svg>
            </div>
            <h2>System Encrypted</h2>
            <p>Authentication Required for Access</p>
            <div class="input-wrapper">

        function buildChapter(num, containerId) {

                        const targetContent = document.getElementById(`tab-content-${cat.id}`);

                    tabWrapper.appendChild(btn);
                });
                spaceGroup.appendChild(tabWrapper);

                    content.className = `tab-content ${idx === 0 ? 'active' : ''}`;

        function init() {
            buildChapter(1, 'builder-content');

            selectOption("aspect", "16_9", "--ar 16:9");

        const lockedChapters = [7];

        function switchChapter(num) {
            const current = document.querySelector('.chapter.active');
            if(current.id === `chapter-${num}`) return;
            currentChapter = num;
            const containerMap = {1:'builder-content', 2:'builder-content-2', 3:'builder-content-3', 4:'builder-content-4', 5:'builder-content-5', 6:'builder-content-6', 7:'builder-content-7'};
            buildChapter(num, containerMap[num]);
            current.classList.add('fade-out');
            selections = {};
            document.getElementById('final-prompt').value = ''; 
            setTimeout(() => {
                document.querySelectorAll('.chapter').forEach(c => { c.classList.remove('active'); c.classList.remove('fade-out'); });
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(`chapter-${num}`).classList.add('active');
                const navItem = document.querySelectorAll('.nav-item')[num-1];
                navItem.classList.add('active');
                document.getElementById('chapter-subtitle').innerText = subtitles[num];
                if(lockedChapters.includes(num)) {
                    document.getElementById('final-prompt').value = '[ LOCKED ] This module is currently under development.';
                } else {
                    document.getElementById('final-prompt').value = '';
                }
            }, 500);
        }

        function selectOption(catId, optId, prompt, multi = false, group = null) {
            if (group === 'space_type') {
                const cfg = allConfigs[currentChapter];
                cfg.forEach(c => {
                    if (c.group === 'space_type') {
                        delete selections[c.id];
                        document.querySelectorAll(`#chapter-${currentChapter} .option-card[data-cat-id="${c.id}"]`).forEach(card => card.classList.remove('selected'));
                    }
                });
                selections[catId] = prompt;
                const target = document.querySelector(`#chapter-${currentChapter} .option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`);
                if(target) target.classList.add('selected');
            } else if (multi) {
                if (!Array.isArray(selections[catId])) selections[catId] = [];
                const idx = selections[catId].indexOf(prompt);
                const target = document.querySelector(`#chapter-${currentChapter} .option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`);
                if (idx > -1) {
                    selections[catId].splice(idx, 1);
                    if(target) target.classList.remove('selected');
                } else {
                    selections[catId].push(prompt);
                    if(target) target.classList.add('selected');
                }
            } else {
                selections[catId] = prompt;
                document.querySelectorAll(`#chapter-${currentChapter} .option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
                const target = document.querySelector(`#chapter-${currentChapter} .option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`);
                if(target) target.classList.add('selected');
            }
            updateResult();
        }

        function updateResult() {
            const area = document.getElementById('final-prompt');
            const cfg = allConfigs[currentChapter];
            let p = [], a = [];
            cfg.forEach(cat => {
                if(selections[cat.id]) {
                    let val = selections[cat.id];
                    if (Array.isArray(val)) {
                        if (val.length > 0) {
                            // Join multi-select items with comma if they have shared prefixes or just space
                            const joined = val.join(', ');
                            p.push(joined);
                        }
                    } else {
                        if(cat.id === 'aspect') a.push(val);
                        else p.push(val);
                    }
                }
            });
            area.value = p.join(' ') + '\n\n' + boosters[currentChapter] + (a.length ? '\n\n' + a.join(' ') : '');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('final-prompt').value).then(() => {
                showToast('PROMPT COPIED! 🚀');
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll(`#chapter-${currentChapter} .option-card`).forEach(c => c.classList.remove('selected'));
            document.getElementById('final-prompt').value = '';
            if(currentChapter === 1) {
                selectOption("base", "hq_std", config[0].options[0].prompt);
                selectOption("aspect", "16_9", "--ar 16:9");
            }
        }

        // Security Authentication Logic
        const ACCESS_KEY = 'godflaelwkdlstmxbeldh';
        
        function verifyAccess() {
            const input = document.getElementById('pass-input');
            const card = document.getElementById('security-card');
            const overlay = document.getElementById('security-overlay');

            if (input.value === ACCESS_KEY) {
                // Success
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                overlay.style.transform = 'scale(1.1)';
                sessionStorage.setItem('haenglim_access', 'true');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 800);
            } else {
                // Failure
                card.classList.add('shake');
                input.value = '';
                input.placeholder = 'INVALID CODE';
                setTimeout(() => {
                    card.classList.remove('shake');
                    input.placeholder = '••••••••';
                }, 600);
            }
        }

        // Check authentication on startup
        if (sessionStorage.getItem('haenglim_access') === 'true') {
            document.getElementById('security-overlay').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
